name: Check Tour Dates

# Run every 10 minutes
on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  check-dates:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Get the code from your repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install required libraries
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Step 4: Run the tour date checker script
      - name: Run tour date checker
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python check_tour_dates.py
      
      # Step 5: Commit and push updated state file
      - name: Commit state changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add seen_dates.json
          git commit -m "Update seen dates - $(date)" || echo "No changes to commit"
          git push
